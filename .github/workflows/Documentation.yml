name: Documentation

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

permissions:
  contents: write
  pages: write
  pull-requests: write
  statuses: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PGFPlotsX renders every figure through `lualatex`; the runner's
      # default image does not ship a TeX install. `pdftocairo`
      # (poppler-utils) is needed for inline PNG previews of the
      # generated PDFs. `--no-install-recommends` keeps the install to
      # ~150 MB instead of the full texlive metapackage's ~1.5 GB.
      - name: Install LaTeX + PDF tools for PGFPlotsX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-pictures \
            texlive-fonts-recommended \
            texlive-luatex \
            poppler-utils
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
